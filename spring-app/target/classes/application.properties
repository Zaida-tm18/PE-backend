# Conexion a la MISMA base de datos PostgreSQL que usa la version PHP.
# Esto permite que ambas tecnologias operen sobre el mismo esquema (sql/schema.sql)
# y facilita la comparacion: no hay diferencias de datos, solo de implementacion.
spring.datasource.url=jdbc:postgresql://postgres_db:5432/veterinaria
spring.datasource.username=${DB_USER:vet_user}
spring.datasource.password=${DB_PASS:vet_pass_2026}
spring.datasource.driver-class-name=org.postgresql.Driver

# Puerto distinto al de PHP (8080) para poder correr ambas apps a la vez
server.port=8090

# En desarrollo, recarga las plantillas sin reiniciar el servidor
spring.thymeleaf.cache=false

# Logs mas claros para depurar consultas SQL durante el desarrollo
logging.level.com.uteq.veterinaria=DEBUG
