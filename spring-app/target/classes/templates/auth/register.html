<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro - Veterinaria (Spring Boot)</title>
</head>
<body>
    <h1>Crear cuenta</h1>

    <ul th:if="${not #lists.isEmpty(errores)}" style="color:red;">
        <li th:each="error : ${errores}" th:text="${error}"></li>
    </ul>

    <form method="post" th:action="@{/register}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <label for="nombre">Nombre completo</label>
        <input type="text" id="nombre" name="nombre" required minlength="3">

        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" required>

        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required minlength="8">

        <label for="password_confirm">Confirmar contraseña</label>
        <input type="password" id="password_confirm" name="password_confirm" required minlength="8">

        <button type="submit">Registrarse</button>
    </form>

    <p>¿Ya tiene cuenta? <a th:href="@{/login}">Inicie sesión</a></p>
</body>
</html>
