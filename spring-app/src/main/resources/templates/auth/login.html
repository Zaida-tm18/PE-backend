<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesión - Veterinaria (Spring Boot)</title>
</head>
<body>
    <h1>Iniciar sesión</h1>

    <p th:if="${errorLogin}" style="color:red;" th:text="${errorLogin}"></p>
    <p th:if="${mensajeLogout}" style="color:green;" th:text="${mensajeLogout}"></p>
    <p th:if="${param.registrado}" style="color:green;">Cuenta creada. Ya puede iniciar sesión.</p>

    <!--
        Spring Security espera por defecto los campos "username" y "password"
        en el POST a /login. El token CSRF (${_csrf}) lo expone automaticamente
        CsrfFilter como atributo de request; Thymeleaf lo lee sin configuracion
        adicional.
    -->
    <form method="post" th:action="@{/login}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <label for="username">Correo electrónico</label>
        <input type="email" id="username" name="username" required>

        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required>

        <button type="submit">Ingresar</button>
    </form>

    <p>¿No tiene cuenta? <a th:href="@{/register}">Regístrese aquí</a></p>
</body>
</html>
