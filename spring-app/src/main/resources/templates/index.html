<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Panel - Sistema Veterinario (Spring Boot)</title>
</head>
<body>
    <h1>Bienvenido(a), <span th:text="${email}"></span></h1>
    <p>Rol: <span th:text="${rol}"></span></p>

    <nav>
        <a th:href="@{/mascotas}">Gestionar mascotas</a> |
        <!-- El logout en Spring Security es POST por defecto (incluye -->
        <!-- CSRF), a diferencia del logout.php de la version PHP que es -->
        <!-- un simple link GET. -->
        <form method="post" th:action="@{/logout}" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit">Cerrar sesión</button>
        </form>
    </nav>
</body>
</html>
